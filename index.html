<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
margin:0;
background:#030712;
font-family:Arial;
}

#map{
height:100vh;
width:100%;
}

/* PRO toolbar */

.toolbar{

position:absolute;

top:10px;

left:50%;

transform:translateX(-50%);

z-index:9999;

background:#020617cc;

backdrop-filter:blur(10px);

padding:8px;

border-radius:12px;

display:flex;

align-items:center;

gap:6px;

border:1px solid rgba(255,255,255,0.15);

color:white;

font-size:12px;

}

.toolBtn{

background:#1f2937;

padding:6px 10px;

border-radius:6px;

cursor:pointer;

border:none;

color:white;

}

.uploadBtn{

background:#2563eb;

padding:6px 12px;

border-radius:6px;

cursor:pointer;

}

input[type=range]{

width:70px;

}

input[type=color]{

width:30px;

height:25px;

border:none;

background:none;

}

.glow{

filter: drop-shadow(0px 0px 6px currentColor);

}

</style>

</head>

<body>

<div class="toolbar">

<div
class="uploadBtn"
onclick="fileInput.click()"
>
Upload
</div>

<input type="file" id="fileInput" hidden>

Opacity

<input
type="range"
min="0.1"
max="1"
step="0.1"
value="0.8"
id="fadeSlider"
>

Border

<input
type="range"
min="1"
max="6"
value="2"
id="borderSize"
>

<input
type="color"
value="#ffd60a"
id="borderColor"
>

Glow

<input
type="checkbox"
id="glowToggle"
>

<button
class="toolBtn"
onclick="resetMap()"
>
Reset
</button>

<button
class="toolBtn"
onclick="takeShot()"
>
PNG
</button>

</div>

<div id="map"></div>

<script>

var map=L.map('map',{
zoomControl:false,
attributionControl:false
}).setView([20,0],3);

L.tileLayer(

'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',

{maxZoom:18}

).addTo(map);

var geoLayer;

var uploadedImage="";

var patterns={};

var selectedLayers=[];

fileInput.addEventListener(
"change",
function(e){

var reader=new FileReader();

reader.onload=function(){

uploadedImage=reader.result;

};

reader.readAsDataURL(
e.target.files[0]
);

});

fetch(
'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson'
)

.then(res=>res.json())

.then(data=>{

geoLayer=L.geoJson(
data,
{

style:{
color:"#415a77",
weight:0.7,
opacity:0.5,
fillOpacity:0
},

onEachFeature:function(feature,layer){

layer.on(
'click',
function(){

if(!selectedLayers.includes(layer))
selectedLayers.push(layer);

applyHighlight(layer);

if(uploadedImage!=""){

var id=
feature.properties.ISO_A3;

var svg=
map.getPanes().overlayPane
.querySelector("svg");

if(!patterns[id]){

var defs=
document.createElementNS(
"http://www.w3.org/2000/svg",
"defs"
);

var pattern=
document.createElementNS(
"http://www.w3.org/2000/svg",
"pattern"
);

pattern.setAttribute(
"id",
"img"+id
);

pattern.setAttribute(
"patternUnits",
"objectBoundingBox"
);

pattern.setAttribute(
"width",
"1"
);

pattern.setAttribute(
"height",
"1"
);

var image=
document.createElementNS(
"http://www.w3.org/2000/svg",
"image"
);

image.setAttribute(
"href",
uploadedImage
);

image.setAttribute(
"width",
"100%"
);

image.setAttribute(
"height",
"100%"
);

image.setAttribute(
"preserveAspectRatio",
"xMidYMid slice"
);

pattern.appendChild(image);

defs.appendChild(pattern);

svg.appendChild(defs);

patterns[id]=pattern;

}

layer.setStyle({

fillOpacity:
fadeSlider.value

});

layer._path.setAttribute(
"fill",
"url(#img"+id+")"
);

}

});

}

}).addTo(map);

});

function applyHighlight(layer){

var zoom=map.getZoom();

var base=
borderSize.value;

var weight=
base*(zoom/3);

layer.setStyle({

color:
borderColor.value,

weight:weight

});

if(glowToggle.checked){

layer._path.classList.add("glow");

}else{

layer._path.classList.remove("glow");

}

}

map.on(
'zoomend',
function(){

selectedLayers.forEach(layer=>{

applyHighlight(layer);

});

});

borderColor.oninput=function(){

selectedLayers.forEach(applyHighlight);

};

borderSize.oninput=function(){

selectedLayers.forEach(applyHighlight);

};

glowToggle.onchange=function(){

selectedLayers.forEach(applyHighlight);

};

fadeSlider.oninput=function(){

selectedLayers.forEach(layer=>{

layer.setStyle({

fillOpacity:
fadeSlider.value

});

});

};

function resetMap(){

selectedLayers=[];

geoLayer.eachLayer(layer=>{

layer.setStyle({

color:"#415a77",

weight:0.7,

fillOpacity:0

});

if(layer._path)
layer._path.classList.remove("glow");

});

}

function takeShot(){

html2canvas(

document.querySelector("#map"),

{

useCORS:true,

scale:2

}

)

.then(canvas=>{

var link=
document.createElement('a');

link.download="map.png";

link.href=
canvas.toDataURL();

link.click();

});

}

</script>

</body>

</html>
