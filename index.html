<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
margin:0;
background:#030712;
font-family:Arial;
}

#map{
height:100vh;
width:100%;
}

/* Desktop */

.toolbar{

position:absolute;
top:15px;
left:15px;

z-index:9999;

background:#020617;

padding:12px;

border-radius:10px;

color:white;

width:210px;

border:1px solid rgba(255,255,255,0.15);

}

/* Mobile fix */

@media(max-width:700px){

.toolbar{

top:10px;
left:10px;

width:170px;

padding:10px;

border-radius:10px;

background:#020617dd;

}

.uploadBtn{

padding:10px;

font-size:13px;

}

button{

padding:9px;

font-size:13px;

}

}


.uploadBtn{

background:#2563eb;

padding:12px;

border-radius:8px;

text-align:center;

cursor:pointer;

margin-top:8px;

font-size:14px;

}

.preview{

width:100%;

margin-top:8px;

border-radius:6px;

display:none;

}

button{

width:100%;

background:#1f2937;

color:white;

border:none;

padding:10px;

margin-top:8px;

border-radius:6px;

cursor:pointer;

font-size:14px;

}

input[type=range]{

margin-top:6px;

}

</style>

</head>

<body>

<div class="toolbar">

<b style="font-size:14px">Overlay</b>

<div
class="uploadBtn"
onclick="document.getElementById('fileInput').click()"
>

Upload

</div>

<input
type="file"
id="fileInput"
style="display:none"
>

<img
id="preview"
class="preview"
>

<input
type="range"
min="0.1"
max="1"
step="0.1"
value="0.8"
id="fadeSlider"
style="width:100%"
>

<button onclick="resetMap()">
Reset
</button>

<button onclick="takeShot()">
PNG
</button>

</div>

<div id="map"></div>

<script>

var map=L.map('map',{
zoomControl:false,
attributionControl:false
}).setView([20,0],3);

L.tileLayer(

'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',

{

maxZoom:18

}).addTo(map);

var geoLayer;
var uploadedImage="";
var patterns={};

document
.getElementById("fileInput")
.addEventListener(
"change",
function(e){

var reader=new FileReader();

reader.onload=function(){

uploadedImage=reader.result;

var img=
document.getElementById("preview");

img.style.display="block";

img.src=uploadedImage;

};

reader.readAsDataURL(
e.target.files[0]
);

});

fetch(
'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson'
)

.then(res=>res.json())

.then(data=>{

geoLayer=L.geoJson(
data,
{

style:{
color:"#415a77",
weight:0.7,
opacity:0.6,
fillOpacity:0
},

onEachFeature:function(feature,layer){

layer.on(
'click',
function(){

layer.setStyle({
color:"#ffd60a",
weight:2
});

if(uploadedImage!=""){

var id=
feature.properties.ISO_A3;

var svg=
map.getPanes().overlayPane
.querySelector("svg");

if(!patterns[id]){

var defs=
document.createElementNS(
"http://www.w3.org/2000/svg",
"defs"
);

var pattern=
document.createElementNS(
"http://www.w3.org/2000/svg",
"pattern"
);

pattern.setAttribute(
"id",
"img"+id
);

pattern.setAttribute(
"patternUnits",
"objectBoundingBox"
);

pattern.setAttribute(
"width",
"1"
);

pattern.setAttribute(
"height",
"1"
);

var image=
document.createElementNS(
"http://www.w3.org/2000/svg",
"image"
);

image.setAttribute(
"href",
uploadedImage
);

image.setAttribute(
"width",
"100%"
);

image.setAttribute(
"height",
"100%"
);

image.setAttribute(
"preserveAspectRatio",
"xMidYMid slice"
);

pattern.appendChild(image);

defs.appendChild(pattern);

svg.appendChild(defs);

patterns[id]=pattern;

}

layer.setStyle({

fillOpacity:
document.getElementById("fadeSlider").value

});

var path=
layer._path;

path.setAttribute(
"fill",
"url(#img"+id+")"
);

}

});

}

}).addTo(map);

});

function resetMap(){

geoLayer.eachLayer(layer=>{

layer.setStyle({

color:"#415a77",
weight:0.7,
fillOpacity:0

});

});

}

function takeShot(){

html2canvas(
document.querySelector("#map"),
{
useCORS:true,
scale:2
}
)

.then(canvas=>{

var link=
document.createElement('a');

link.download="map.png";

link.href=
canvas.toDataURL();

link.click();

});

}

</script>

</body>

</html>
