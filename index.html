<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
margin:0;
background:black;
font-family:Arial;
overflow:hidden;
}

#map{
height:100vh;
width:100%;
}

/* cinematic pan feel */

.leaflet-container{

transition:transform 1.4s ease;

}

/* settings button */

.fab{

position:absolute;

top:15px;

right:15px;

width:46px;

height:46px;

border-radius:50%;

background:#2563eb;

display:flex;

align-items:center;

justify-content:center;

color:white;

font-size:22px;

cursor:pointer;

z-index:9999;

}

/* toolbar */

.toolbar{

position:absolute;

top:70px;

right:15px;

background:#020617ee;

padding:12px;

border-radius:12px;

display:none;

flex-direction:column;

gap:7px;

color:white;

font-size:12px;

z-index:9999;

}

/* glow */

.glow{

filter:
drop-shadow(0 0 8px gold)
drop-shadow(0 0 18px orange);

}

/* border draw */

.leaflet-interactive{

stroke-dasharray:1200;

stroke-dashoffset:1200;

animation:draw 1s forwards;

}

@keyframes draw{

to{

stroke-dashoffset:0;

}

}

/* label animation */

.label{

color:white;

font-weight:bold;

font-size:12px;

text-shadow:0 0 8px black;

animation:fade .6s;

}

@keyframes fade{

from{opacity:0; transform:translateY(10px)}

to{opacity:1}

}

</style>

</head>

<body>

<div
class="fab"
onclick="toggleTools()"
>
⚙
</div>

<div
class="toolbar"
id="tools"
>

Upload Flag

<input type="file" id="fileInput">

Opacity

<input
type="range"
min="0"
max="1"
step="0.1"
value="0.6"
id="fadeSlider"
>

Border

<input
type="range"
min="1"
max="6"
value="2"
id="borderSize"
>

Color

<input
type="color"
value="#ffd60a"
id="borderColor"
>

Glow

<input
type="checkbox"
id="glowToggle"
checked
>

<button onclick="recordMode()">
Recording Mode
</button>

<button onclick="resetMap()">
Reset
</button>

<button onclick="takeShot()">
Export
</button>

</div>

<div id="map"></div>

<script>

var map=L.map(

'map',

{

zoomControl:false,

attributionControl:false,

preferCanvas:true,

zoomAnimation:false,

fadeAnimation:false,

markerZoomAnimation:false

}

).setView([20,0],3);

/* tiles */

L.tileLayer(

'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',

{

maxZoom:18,

keepBuffer:30,

updateWhenIdle:true,

updateWhenZooming:false

}

).addTo(map);

var uploadedImage="";

var selected=[];

var labels=[];

var patterns={};

function toggleTools(){

var t=
document.getElementById("tools");

t.style.display=
t.style.display=="flex"
?"none"
:"flex";

}

fileInput.onchange=function(e){

var r=
new FileReader();

r.onload=function(){

uploadedImage=r.result;

};

r.readAsDataURL(
e.target.files[0]
);

};

/* GEOJSON */

fetch(
'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson'
)

.then(r=>r.json())

.then(data=>{

L.geoJson(

data,

{

style:{

color:"#415a77",

weight:.7,

fillOpacity:0

},

onEachFeature:
function(feature,layer){

layer.on(
'click',
function(){

focusCountry(layer);

highlight(layer);

addLabel(feature,layer);

addFlag(feature,layer);

});

}

}

).addTo(map);

});

/* PAN ONLY */

function focusCountry(layer){

var center=
layer.getBounds()
.getCenter();

map.panTo(

center,

{

animate:true,

duration:1.4

}

);

}

/* highlight */

function highlight(layer){

layer.setStyle({

color:borderColor.value,

weight:borderSize.value,

fillOpacity:fadeSlider.value

});

if(glowToggle.checked)

layer._path.classList.add("glow");

}

/* label */

function addLabel(feature,layer){

var c=
layer.getBounds()
.getCenter();

var m=
L.marker(

c,

{

icon:L.divIcon({

className:"label",

html:feature.properties.ADMIN

})

}

).addTo(map);

labels.push(m);

}

/* flag */

function addFlag(feature,layer){

if(uploadedImage=="")
return;

var id=
feature.properties.ISO_A3;

var svg=
map.getPanes()
.overlayPane
.querySelector("svg");

if(!patterns[id]){

var defs=
document.createElementNS(

"http://www.w3.org/2000/svg",

"defs"

);

var pattern=
document.createElementNS(

"http://www.w3.org/2000/svg",

"pattern"

);

pattern.setAttribute(
"id",
"id"+id
);

pattern.setAttribute(
"width","1"
);

pattern.setAttribute(
"height","1"
);

var img=
document.createElementNS(

"http://www.w3.org/2000/svg",

"image"

);

img.setAttribute(
"href",
uploadedImage
);

img.setAttribute(
"width","100%"
);

img.setAttribute(
"height","100%"
);

pattern.appendChild(img);

defs.appendChild(pattern);

svg.appendChild(defs);

patterns[id]=true;

}

layer._path.setAttribute(

"fill",

"url(#id"+id+")"

);

}

/* record */

function recordMode(){

tools.style.display="none";

document
.querySelector(".fab")
.style.display="none";

}

/* reset */

function resetMap(){

labels.forEach(l=>map.removeLayer(l));

labels=[];

map.eachLayer(layer=>{

if(layer.setStyle)

layer.setStyle({

color:"#415a77",

weight:.7,

fillOpacity:0

});

});

}

/* export */

function takeShot(){

tools.style.display="none";

html2canvas(

document.querySelector("#map"),

{

scale:2

}

)

.then(canvas=>{

var link=
document.createElement('a');

link.download="map.png";

link.href=
canvas.toDataURL();

link.click();

});

}

borderColor.oninput=
()=>selected.forEach(highlight);

borderSize.oninput=
()=>selected.forEach(highlight);

fadeSlider.oninput=
()=>selected.forEach(highlight);

glowToggle.onchange=
()=>selected.forEach(highlight);

</script>

</body>

</html>
