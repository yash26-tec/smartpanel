<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
margin:0;
background:#030712;
font-family:Arial;
}

#map{
height:100vh;
width:100%;
}

.toolbar{

position:absolute;
top:20px;
left:20px;

z-index:9999;

background:#020617;

padding:15px;

border-radius:12px;

color:white;

width:230px;

border:1px solid rgba(255,255,255,0.15);

}

@media(max-width:700px){

.toolbar{

bottom:0;
top:auto;
left:0;

width:100%;

border-radius:20px 20px 0 0;

padding:18px;

background:#020617ee;

backdrop-filter:blur(10px);

}

}

.uploadBtn{

background:#2563eb;

padding:14px;

border-radius:8px;

text-align:center;

cursor:pointer;

margin-top:10px;

font-size:15px;

}

.preview{

width:100%;

margin-top:10px;

border-radius:8px;

display:none;

}

button{

width:100%;

background:#1f2937;

color:white;

border:none;

padding:12px;

margin-top:10px;

border-radius:8px;

cursor:pointer;

font-size:15px;

}

</style>

</head>

<body>

<div class="toolbar">

<b>Overlay Image</b>

<div
class="uploadBtn"
onclick="document.getElementById('fileInput').click()"
>

Upload Image

</div>

<input
type="file"
id="fileInput"
style="display:none"
>

<img
id="preview"
class="preview"
>

Opacity

<input
type="range"
min="0.1"
max="1"
step="0.1"
value="0.8"
id="fadeSlider"
style="width:100%"
>

<button onclick="resetMap()">
Reset
</button>

<button onclick="takeShot()">
Export PNG
</button>

</div>

<div id="map"></div>

<script>

var map=L.map('map',{
zoomControl:false,
attributionControl:false
}).setView([20,0],3);


L.tileLayer(

'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',

{

maxZoom:18

}).addTo(map);


var geoLayer;

var uploadedImage="";

var patterns={};

var indiaCustom="india.png";



document

.getElementById("fileInput")

.addEventListener(

"change",

function(e){

var reader=new FileReader();

reader.onload=function(){

uploadedImage=reader.result;

var img=
document.getElementById("preview");

img.style.display="block";

img.src=uploadedImage;

};

reader.readAsDataURL(
e.target.files[0]
);

});


fetch(
'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson'
)

.then(res=>res.json())

.then(data=>{

geoLayer=L.geoJson(

data,

{

style:{

color:"#415a77",
weight:0.7,
opacity:0.6,
fillOpacity:0

},

onEachFeature:function(feature,layer){

layer.on('click',function(){


/* AUTO FOCUS */

map.fitBounds(

layer.getBounds(),

{

padding:[20,20],

maxZoom:5,

animate:true

});



layer.setStyle({

color:"#ffd60a",
weight:2

});


var id=
feature.properties.ISO_A3;


var imageToUse=
uploadedImage;


if(id=="IND"){

imageToUse=
indiaCustom;

}


if(imageToUse!=""){


var svg=
map.getPanes().overlayPane
.querySelector("svg");


if(!patterns[id]){


var defs=
document.createElementNS(
"http://www.w3.org/2000/svg",
"defs"
);


var pattern=
document.createElementNS(
"http://www.w3.org/2000/svg",
"pattern"
);


pattern.setAttribute(
"id",
"img"+id
);


pattern.setAttribute(
"patternUnits",
"objectBoundingBox"
);


pattern.setAttribute(
"width",
"1"
);


pattern.setAttribute(
"height",
"1"
);



var image=
document.createElementNS(
"http://www.w3.org/2000/svg",
"image"
);


image.setAttribute(
"href",
imageToUse
);


image.setAttribute(
"width",
"100%"
);


image.setAttribute(
"height",
"100%"
);


image.setAttribute(
"preserveAspectRatio",
"xMidYMid slice"
);



pattern.appendChild(image);

defs.appendChild(pattern);

svg.appendChild(defs);

patterns[id]=pattern;

}



layer.setStyle({

fillOpacity:
document.getElementById("fadeSlider").value

});


var path=
layer._path;


path.setAttribute(

"fill",

"url(#img"+id+")"

);


}

});

}

}).addTo(map);

});


function resetMap(){

geoLayer.eachLayer(layer=>{

layer.setStyle({

color:"#415a77",

weight:0.7,

fillOpacity:0

});

});

}



function takeShot(){

html2canvas(

document.querySelector("#map"),

{

useCORS:true,

scale:2

}

)

.then(canvas=>{

var link=
document.createElement('a');

link.download="map.png";

link.href=
canvas.toDataURL();

link.click();

});

}

</script>

</body>

</html>
