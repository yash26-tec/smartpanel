<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Geopolitics Explainer Map Tool</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: Arial, Helvetica, sans-serif;
  background: #000;
}
#app {
  position: relative;
  width: 100%;
  height: 100%;
}
#map {
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 50% 45%, rgba(30,64,175,.35), transparent 30%), linear-gradient(180deg, #020617 0%, #000 100%);
}
.leaflet-control-container { display: none; }
.fab {
  position: absolute;
  top: max(14px, env(safe-area-inset-top));
  right: max(14px, env(safe-area-inset-right));
  width: 52px;
  height: 52px;
  border-radius: 16px;
  background: rgba(15, 23, 42, 0.88);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,.14);
  color: white;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 9999;
  box-shadow: 0 12px 30px rgba(0,0,0,.35);
}
.search-chip {
  position: absolute;
  top: max(14px, env(safe-area-inset-top));
  left: 14px;
  z-index: 9999;
  display: flex;
  align-items: center;
  gap: 8px;
  width: min(320px, calc(100vw - 92px));
  padding: 8px;
  border-radius: 18px;
  background: rgba(15, 23, 42, 0.84);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,.1);
  box-shadow: 0 16px 40px rgba(0,0,0,.28);
}
.search-chip input {
  flex: 1;
  min-width: 0;
  min-height: 38px;
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,.08);
  box-sizing: border-box;
  background: rgba(255,255,255,.06);
  color: #fff;
  outline: none;
}
.search-chip input::placeholder {
  color: rgba(255,255,255,.55);
}
.search-chip input:focus {
  border-color: rgba(96,165,250,.8);
  box-shadow: 0 0 0 3px rgba(59,130,246,.18);
}
.search-chip button {
  min-width: 42px;
  width: 42px;
  height: 42px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,.08);
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  color: #fff;
  cursor: pointer;
}
.toolbar {
  position: absolute;
  top: calc(max(14px, env(safe-area-inset-top)) + 64px);
  right: max(12px, env(safe-area-inset-right));
  left: auto;
  background: rgba(15, 23, 42, 0.84);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,.1);
  padding: 14px;
  border-radius: 20px;
  color: white;
  font-size: 12px;
  display: none;
  flex-direction: column;
  gap: 10px;
  z-index: 9999;
  width: min(320px, calc(100vw - 24px));
  box-shadow: 0 20px 50px rgba(0,0,0,.38);
  max-height: calc(100vh - 92px);
  overflow: auto;
}
.toolbar::-webkit-scrollbar {
  width: 8px;
}
.toolbar::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,.14);
  border-radius: 999px;
}
.toolbar input,
.toolbar select,
.toolbar button {
  width: 100%;
  min-height: 42px;
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,.08);
  box-sizing: border-box;
  background: rgba(255,255,255,.06);
  color: #fff;
  outline: none;
}
.toolbar input::placeholder {
  color: rgba(255,255,255,.55);
}
.toolbar input:focus,
.toolbar select:focus {
  border-color: rgba(96,165,250,.8);
  box-shadow: 0 0 0 3px rgba(59,130,246,.18);
}
.toolbar button {
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  color: white;
  cursor: pointer;
  font-weight: 600;
  letter-spacing: .01em;
}
.toolbar button:hover {
  filter: brightness(1.05);
}
.toolbar .secondary {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.08);
}
@media (max-width: 768px) {
  .fab {
    width: 50px;
    height: 50px;
    border-radius: 14px;
    top: auto;
    bottom: max(16px, env(safe-area-inset-bottom));
    right: max(16px, env(safe-area-inset-right));
  }
  .search-chip {
    top: max(12px, env(safe-area-inset-top));
    left: 12px;
    right: 74px;
    width: auto;
    border-radius: 16px;
    padding: 7px;
  }
  .search-chip input {
    min-height: 40px;
    font-size: 14px;
  }
  .toolbar {
    left: 12px;
    right: 12px;
    top: auto;
    bottom: calc(max(16px, env(safe-area-inset-bottom)) + 62px);
    width: auto;
    max-height: min(72vh, 680px);
    border-radius: 22px;
    padding: 14px;
  }
  .toolbar input,
  .toolbar select,
  .toolbar button {
    min-height: 44px;
    font-size: 14px;
  }
}
.country-label {
  color: white;
  font-weight: 700;
  font-size: 13px;
  text-shadow: 0 2px 10px rgba(0,0,0,.85);
  white-space: nowrap;
  transform: translate(-50%, -50%);
  pointer-events: none;
  background: rgba(15,23,42,.72);
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,.1);
}
.status-pill {
  position: absolute;
  left: 12px;
  bottom: 12px;
  background: rgba(15,23,42,.8);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: white;
  font-size: 12px;
  padding: 10px 12px;
  border-radius: 999px;
  z-index: 9999;
  border: 1px solid rgba(255,255,255,.1);
  box-shadow: 0 10px 25px rgba(0,0,0,.22);
  max-width: min(78vw, 420px);
}
.recording .fab,
.recording .toolbar,
.recording .status-pill {
  display: none !important;
}
.hidden-svg-host {
  position: absolute;
  width: 0;
  height: 0;
  overflow: hidden;
  pointer-events: none;
}
.path-label {
  color: #fff;
  font-size: 11px;
  font-weight: bold;
  text-shadow: 0 0 6px rgba(0,0,0,0.9);
  white-space: nowrap;
}
.arrow-handle,
.missile-handle {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 0 2px rgba(0,0,0,0.35);
}
.arrow-handle { border: 2px solid #ef4444; }
.missile-handle { border: 2px solid #f59e0b; }
.preview-modal {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.78);
  z-index: 10000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.preview-card {
  width: min(92vw, 900px);
  max-height: 90vh;
  background: #0f172a;
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(0,0,0,.5);
  display: flex;
  flex-direction: column;
}
.preview-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  color: #fff;
  background: rgba(255,255,255,.04);
}
.preview-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.preview-actions button,
.preview-actions a {
  background: #2563eb;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 10px;
  text-decoration: none;
  font-size: 12px;
  cursor: pointer;
}
.preview-actions .secondary {
  background: #334155;
}
.preview-body {
  background: transparent;
  overflow: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18px;
  min-height: 320px;
}
.preview-body img,
.preview-body iframe,
.preview-body object {
  max-width: 100%;
  max-height: 70vh;
  background: transparent;
}
.preview-note {
  color: #cbd5e1;
  font-size: 12px;
  padding: 0 14px 14px;
}
</style>
</head>
<body>
<div id="app">
  <div class="search-chip" id="searchChip">
    <input id="quickSearchInput" placeholder="Search country..." />
    <button id="quickSearchBtn" type="button">⌕</button>
  </div>
  <div class="fab" id="fab">⚙</div>
  <div class="toolbar" id="tools">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:2px;">
      <div>
        <div style="font-size:15px;font-weight:700;letter-spacing:.01em;">Map Controls</div>
        <div style="font-size:11px;color:rgba(255,255,255,.6);margin-top:2px;">Mobile-friendly control panel</div>
      </div>
    </div>

    <div style="font-size:11px;color:rgba(255,255,255,.62);font-weight:600;letter-spacing:.03em;text-transform:uppercase;">Border Color</div>
    <input type="color" id="borderColor" value="#ffd60a" />

    <div style="font-size:11px;color:rgba(255,255,255,.62);font-weight:600;letter-spacing:.03em;text-transform:uppercase;">Border Size</div>
    <input type="range" min="1" max="6" step="0.5" value="2" id="borderSize" />

    <div style="font-size:11px;color:rgba(255,255,255,.62);font-weight:600;letter-spacing:.03em;text-transform:uppercase;">Opacity</div>
    <input type="range" min="0" max="0.8" step="0.05" value="0.35" id="fadeSlider" />

    <div style="font-size:11px;color:rgba(255,255,255,.62);font-weight:600;letter-spacing:.03em;text-transform:uppercase;">Fill Mode</div>
    <select id="fillModeSelect">
      <option value="solid">Solid Color</option>
      <option value="flag">Flag Fill</option>
      <option value="pulseFlag">Animated Flag Fill</option>
    </select>

    <div style="font-size:11px;color:rgba(255,255,255,.62);font-weight:600;letter-spacing:.03em;text-transform:uppercase;">Basemap</div>
    <select id="basemapSelect">
      <option value="satellite" selected>Satellite</option>
      <option value="dark">Dark Map Fallback</option>
      <option value="indiaOutline">India Outline Map</option>
    </select>

    <div style="display:grid;grid-template-columns:1fr;gap:8px;margin-top:2px;">
      <label style="display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.06);"><input type="checkbox" id="labelToggle" checked style="width:16px;height:16px;min-height:auto;accent-color:#3b82f6;" /> <span>Show Label</span></label>
      <label style="display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.06);"><input type="checkbox" id="flagToggle" style="width:16px;height:16px;min-height:auto;accent-color:#3b82f6;" /> <span>Small Flag Marker</span></label>
      <label style="display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.06);"><input type="checkbox" id="dragFillToggle" style="width:16px;height:16px;min-height:auto;accent-color:#3b82f6;" /> <span>Drag Full Flag Fill</span></label>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <button id="recordBtn">Record Mode</button>
      <button class="secondary" id="showUiBtn">Show UI</button>
      <button id="warArrowBtn">War Arrow</button>
      <button id="missileBtn">Missile Path</button>
      <button class="secondary" id="clearPathsBtn">Clear Paths</button>
      <button class="secondary" id="clearSelectionBtn">Clear Map</button>
      <button id="exportNoFlagBtn">PNG Solid</button>
      <button id="exportWithFlagBtn">PNG Flag</button>
      <button id="exportLandBtn">PNG Land</button>
      <button class="secondary" id="resetBtn" style="grid-column:1 / -1;">Full Reset</button>
    </div>
  </div>
  <div id="map"></div>
  <div class="status-pill" id="statusPill">Loading map...</div>
  <div id="svgFallbackHost" class="hidden-svg-host"></div>
  <div id="previewModal" class="preview-modal">
    <div class="preview-card">
      <div class="preview-header">
        <strong id="previewTitle">Export Preview</strong>
        <div class="preview-actions">
          <button id="previewDownloadBtn" type="button">Download</button>
          <a id="previewOpenLink" target="_blank" rel="noopener" class="secondary">Open</a>
          <button id="previewCloseBtn" class="secondary" type="button">Close</button>
        </div>
      </div>
      <div id="previewBody" class="preview-body"></div>
      <div id="previewNote" class="preview-note">If automatic download is blocked, use Download or Open.</div>
    </div>
  </div>
</div>

  var quickSearchInput = document.getElementById('quickSearchInput');
  var quickSearchBtn = document.getElementById('quickSearchBtn');
  var borderColorInput = document.getElementById('borderColor');
  var borderSizeInput = document.getElementById('borderSize');
  var fadeSliderInput = document.getElementById('fadeSlider');
  var fillModeSelect = document.getElementById('fillModeSelect');
  var basemapSelect = document.getElementById('basemapSelect');
  var labelToggle = document.getElementById('labelToggle');

  function useBasemap(type) {
    hideIndiaSchoolOutline();
    if (activeBaseLayer) {
      map.removeLayer(activeBaseLayer);
      activeBaseLayer = null;
    }

    if (type === 'indiaOutline') {
      map.getContainer().style.background = '#9ec7e5';
      if (geoLayer) map.setView([22.8, 81.2], 4.6, { animate: false });
      showIndiaSchoolOutline();
      setStatus('India school-outline mode');
      return;
    }

    map.getContainer().style.background = '';
    activeBaseLayer = type === 'dark' ? darkLayer : satelliteLayer;
    activeBaseLayer.addTo(map);
    setStatus(type === 'dark' ? 'Dark fallback map loaded' : 'Satellite map loaded');
  }

  function toggleTools() {
    tools.style.display = tools.style.display === 'flex' ? 'none' : 'flex';
  }

  function showUI() {
    app.classList.remove('recording');
  }

  function getFeatureName(feature) {
    if (!feature || !feature.properties) return 'Unknown';
    return feature.properties.ADMIN || feature.properties.NAME || feature.properties.name || 'Unknown';
  }

  function getIso2(feature) {
    if (!feature || !feature.properties) return null;
    var props = feature.properties;
    var directCandidates = [props.ISO_A2, props.iso_a2, props.ISO2, props.iso2, props['ISO3166-1-Alpha-2'], props.iso3166_1_alpha_2];
    for (var i = 0; i < directCandidates.length; i += 1) {
      var raw = directCandidates[i];
      if (!raw || raw === '-99') continue;
      var normalized = String(raw).trim().toLowerCase();
      if (/^[a-z]{2}$/.test(normalized)) return normalized;
    }
    var a3 = String(props.ISO_A3 || props.iso_a3 || props.ADM0_A3 || props.adm0_a3 || props['ISO3166-1-Alpha-3'] || '').trim().toUpperCase();
    var a3ToA2 = {
      IND: 'in', USA: 'us', CHN: 'cn', RUS: 'ru', FRA: 'fr', DEU: 'de', ITA: 'it', GBR: 'gb', BRA: 'br', JPN: 'jp', PAK: 'pk',
      BGD: 'bd', TUR: 'tr', UKR: 'ua', ARG: 'ar', IDN: 'id', NLD: 'nl', POL: 'pl', IRL: 'ie', FIN: 'fi', ESP: 'es', PRT: 'pt',
      BEL: 'be', CHE: 'ch', AUT: 'at', SWE: 'se', NOR: 'no', DNK: 'dk', GRC: 'gr', ISR: 'il', SAU: 'sa', ARE: 'ae', IRN: 'ir',
      IRQ: 'iq', AFG: 'af', KOR: 'kr', PRK: 'kp', AUS: 'au', NZL: 'nz', CAN: 'ca', MEX: 'mx', ZAF: 'za', EGY: 'eg', ETH: 'et',
      NGA: 'ng', KEN: 'ke', VNM: 'vn', THA: 'th', MMR: 'mm', LKA: 'lk', NPL: 'np', BTN: 'bt', MAR: 'ma', DZA: 'dz'
    };
    if (a3 && a3ToA2[a3]) return a3ToA2[a3];
    return null;
  }

  function getFlagUrl(feature) {
    var iso2 = getIso2(feature);
    return iso2 ? 'https://flagcdn.com/w320/' + iso2 + '.png' : null;
  }

  function clearMarkers() {
    if (labelMarker) { map.removeLayer(labelMarker); labelMarker = null; }
    if (flagMarker) { map.removeLayer(flagMarker); flagMarker = null; }
    if (indiaClaimOverlay) { map.removeLayer(indiaClaimOverlay); indiaClaimOverlay = null; }
  }

  function clearPaths() {
    pathLayers.forEach(function (layer) { if (map.hasLayer(layer)) map.removeLayer(layer); });
    pathHandles.forEach(function (layer) { if (map.hasLayer(layer)) map.removeLayer(layer); });
    pathLabels.forEach(function (layer) { if (map.hasLayer(layer)) map.removeLayer(layer); });
    pathLayers = [];
    pathHandles = [];
    pathLabels = [];
    setStatus('All arrows and missile paths cleared');
  }

  function stopAnimation() {
    if (animationFrame) {
      cancelAnimationFrame(animationFrame);
      animationFrame = null;
    }
  }

  function resetLayerStyles() {
    stopAnimation();
    if (!geoLayer) return;
    geoLayer.eachLayer(function (layer) {
      layer.setStyle({ color: '#ffffff', weight: 0.7, fillOpacity: 0, fillColor: '#ffffff', opacity: 1 });
      if (layer._path) {
        layer._path.removeAttribute('fill');
        layer._path.style.fill = 'transparent';
        layer._path.style.fillOpacity = '0';
        layer._path.style.filter = 'none';
      }
    });
  }

  function getOrCreateDefsRoot() {
    var overlaySvg = map.getPanes().overlayPane.querySelector('svg');
    var hostSvg = svgFallbackHost.querySelector('svg');
    var svg = overlaySvg || hostSvg;
    if (!svg) {
      svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('width', '0');
      svg.setAttribute('height', '0');
      svgFallbackHost.appendChild(svg);
    }
    var defs = svg.querySelector('defs');
    if (!defs) {
      defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
      svg.appendChild(defs);
    }
    return defs;
  }

  function setAttrs(node, attrs) {
    Object.keys(attrs).forEach(function (key) { node.setAttribute(key, attrs[key]); });
  }

  function createSvgNode(name, attrs) {
    var node = document.createElementNS('http://www.w3.org/2000/svg', name);
    if (attrs) setAttrs(node, attrs);
    return node;
  }

  function createFlagPattern(patternId, iso2) {
    var defs = getOrCreateDefsRoot();
    var existing = document.getElementById(patternId);
    if (existing) {
      existing.innerHTML = '';
      return buildFlag(existing, iso2);
    }
    var pattern = createSvgNode('pattern', {
      id: patternId,
      patternUnits: 'objectBoundingBox',
      patternContentUnits: 'objectBoundingBox',
      x: '0',
      y: '0',
      width: '1',
      height: '1'
    });
    defs.appendChild(pattern);
    return buildFlag(pattern, iso2);
  }

  function buildFlag(pattern, iso2) {
    function rect(x, y, w, h, fill) {
      pattern.appendChild(createSvgNode('rect', { x: x, y: y, width: w, height: h, fill: fill }));
    }
    function circle(cx, cy, r, fill, extra) {
      var attrs = { cx: cx, cy: cy, r: r, fill: fill };
      if (extra) Object.keys(extra).forEach(function (k) { attrs[k] = extra[k]; });
      pattern.appendChild(createSvgNode('circle', attrs));
    }
    function line(x1, y1, x2, y2, stroke, width) {
      pattern.appendChild(createSvgNode('line', {
        x1: x1, y1: y1, x2: x2, y2: y2,
        stroke: stroke,
        'stroke-width': width,
        'stroke-linecap': 'round'
      }));
    }

    if (iso2 === 'in') {
      rect(0, 0, 1, 0.3334, '#FF9933');
      rect(0, 0.3334, 1, 0.3332, '#FFFFFF');
      rect(0, 0.6666, 1, 0.3334, '#138808');
      circle(0.5, 0.5, 0.12, 'none', { stroke: '#000080', 'stroke-width': 0.018 });
      circle(0.5, 0.5, 0.012, '#000080');
      for (var i = 0; i < 24; i += 1) {
        var angle = (Math.PI * 2 * i) / 24 - Math.PI / 2;
        line(0.5, 0.5, 0.5 + 0.12 * Math.cos(angle), 0.5 + 0.12 * Math.sin(angle), '#000080', 0.01);
      }
      return pattern;
    }

    if (iso2 && iso2.length === 2) {
      var img = createSvgNode('image', {
        href: 'https://flagcdn.com/' + iso2 + '.svg',
        x: '0',
        y: '0',
        width: '1',
        height: '1',
        preserveAspectRatio: 'none'
      });
      pattern.appendChild(img);
      return pattern;
    }

    rect(0, 0, 1, 0.3334, '#2563eb');
    rect(0, 0.3334, 1, 0.3332, '#ffffff');
    rect(0, 0.6666, 1, 0.3334, '#dc2626');
    return pattern;
  }

  function getFillOffsetKey(feature) {
    return 'flag-fill-offset-' + (getIso2(feature) || 'generic');
  }

  function getStoredFillOffset(feature) {
    try {
      var raw = localStorage.getItem(getFillOffsetKey(feature));
      if (!raw) return { x: 0, y: 0 };
      var parsed = JSON.parse(raw);
      return { x: Number(parsed.x) || 0, y: Number(parsed.y) || 0 };
    } catch (e) {
      return { x: 0, y: 0 };
    }
  }

  function saveFillOffset(feature, offset) {
    localStorage.setItem(getFillOffsetKey(feature), JSON.stringify({ x: Number(offset.x) || 0, y: Number(offset.y) || 0 }));
  }

  function applyPatternOffset(pattern, offset) {
    if (!pattern) return;
    pattern.setAttribute('x', String(Number(offset.x) || 0));
    pattern.setAttribute('y', String(Number(offset.y) || 0));
  }

  function applyProceduralFlagFill(layer, feature) {
    if (!layer || !layer._path) return false;
    var iso2 = getIso2(feature) || 'generic';
    var patternId = 'flag-fill-' + iso2;
    var pattern = createFlagPattern(patternId, iso2);
    if (!pattern) return false;
    applyPatternOffset(pattern, getStoredFillOffset(feature));
    layer._path.setAttribute('fill', 'url(#' + patternId + ')');
    layer._path.style.fill = 'url(#' + patternId + ')';
    layer._path.style.fillOpacity = String(Number(fadeSliderInput.value));
    return true;
  }

  function animateSelectedLayer() {
    stopAnimation();
    if (!selectedLayer || !selectedLayer._path) return;
    var start = null;
    function tick(ts) {
      if (!start) start = ts;
      if (!selectedLayer || !selectedLayer._path) return;
      var progress = (ts - start) / 1000;
      var wave = 0.45 + ((Math.sin(progress * 4) + 1) / 2) * 0.35;
      selectedLayer._path.style.fillOpacity = String(wave);
      animationFrame = requestAnimationFrame(tick);
    }
    animationFrame = requestAnimationFrame(tick);
  }

  function getVisualCenter(layer) {
    var latlngs = layer.getLatLngs();
    if (!latlngs || !latlngs.length) return layer.getBounds().getCenter();
    function flatten(input, out) {
      for (var i = 0; i < input.length; i += 1) {
        if (Array.isArray(input[i])) flatten(input[i], out);
        else if (input[i] && typeof input[i].lat === 'number' && typeof input[i].lng === 'number') out.push(input[i]);
      }
    }
    var points = [];
    flatten(latlngs, points);
    if (!points.length) return layer.getBounds().getCenter();
    var sumLat = 0;
    var sumLng = 0;
    for (var j = 0; j < points.length; j += 1) {
      sumLat += points[j].lat;
      sumLng += points[j].lng;
    }
    return L.latLng(sumLat / points.length, sumLng / points.length);
  }

  function selectCountry(feature, layer) {
    if (!feature || !layer) return;
    selectedLayer = layer;
    selectedFeature = feature;
    var bounds = layer.getBounds();
    if (bounds && bounds.isValid && bounds.isValid()) {
      map.flyToBounds(bounds, { duration: 1.5, padding: [60, 60] });
    }
    setTimeout(function () { applyHighlight(layer, feature); }, 220);
  }

  function addFlag(feature, layer) {
    if (!flagToggle.checked) return;
    var flagUrl = getFlagUrl(feature);
    if (!flagUrl) return;
    var center = layer.getBounds().getCenter();
    flagMarker = L.marker([center.lat + 2, center.lng], {
      icon: L.divIcon({ className: '', html: '<div style="background:rgba(0,0,0,.7);border-radius:6px;padding:2px;box-shadow:0 2px 10px rgba(0,0,0,.35);"><img src="' + flagUrl + '" alt="flag" style="width:34px;border-radius:3px;display:block;"></div>' })
    }).addTo(map);
  }

  function addLabel(feature, layer) {
    clearMarkers();
    if (labelToggle.checked) {
      var center = layer.getBounds().getCenter();
      labelMarker = L.marker(L.latLng(center.lat - 4, center.lng), {
        interactive: false,
        icon: L.divIcon({ className: 'country-label', html: getFeatureName(feature), iconSize: [0, 0], iconAnchor: [0, 0] })
      }).addTo(map);
    }
    addFlag(feature, layer);
  }

  function applyHighlight(layer, feature) {
    if (!geoLayer || !layer || !feature) return;
    var color = borderColorInput.value;
    var size = Number(borderSizeInput.value);
    var opacity = Number(fadeSliderInput.value);
    var fillMode = fillModeSelect.value;
    resetLayerStyles();
    clearMarkers();
    layer.setStyle({ color: color, weight: size, fillColor: color, fillOpacity: opacity, opacity: 1 });
    addLabel(feature, layer);
    if (fillMode === 'solid') {
      applyIndiaClaimOverlay(feature, fillMode, color, size, opacity);
      setStatus(getFeatureName(feature) + ' selected');
      return;
    }
    if (!applyProceduralFlagFill(layer, feature)) {
      layer.setStyle({ fillColor: color, fillOpacity: opacity });
      applyIndiaClaimOverlay(feature, 'solid', color, size, opacity);
      setStatus('Flag fill unavailable for ' + getFeatureName(feature) + '. Using solid color');
      return;
    }
    applyIndiaClaimOverlay(feature, fillMode, color, size, opacity);
    if (fillMode === 'pulseFlag') animateSelectedLayer();
    setStatus(getFeatureName(feature) + ' selected');
  }

  function applyIndiaClaimOverlay(feature, fillMode, color, size, opacity) {
    if (!feature || getIso2(feature) !== 'in') return;

    var aksaiChinCoords = [
      [35.65, 78.05],
      [35.95, 79.10],
      [35.70, 80.65],
      [35.20, 81.65],
      [34.75, 80.95],
      [34.55, 79.85],
      [34.70, 78.65],
      [35.05, 78.00]
    ];

    indiaClaimOverlay = L.polygon(aksaiChinCoords, {
      color: color,
      weight: size,
      fillColor: color,
      fillOpacity: opacity,
      interactive: false,
      smoothFactor: 0
    }).addTo(map);

    if (fillMode !== 'solid' && indiaClaimOverlay._path) {
      var iso2 = 'in';
      var patternId = 'flag-fill-' + iso2;
      var pattern = createFlagPattern(patternId, iso2);
      if (pattern) {
        applyPatternOffset(pattern, getStoredFillOffset(feature));
        indiaClaimOverlay._path.setAttribute('fill', 'url(#' + patternId + ')');
        indiaClaimOverlay._path.style.fill = 'url(#' + patternId + ')';
        indiaClaimOverlay._path.style.fillOpacity = String(opacity);
      }
    }
  }

  function clearSelection() {
    resetLayerStyles();
    clearMarkers();
    selectedLayer = null;
    selectedFeature = null;
    setStatus('Selection cleared');
  }

  function resetMap() {
    resetLayerStyles();
    clearMarkers();
    clearPaths();
    selectedLayer = null;
    selectedFeature = null;
    map.flyTo([20, 0], 3);
    setStatus('Map reset');
  }

  var currentPreviewUrl = '';
  var currentPreviewFilename = '';

  function closePreviewModal() {
    previewModal.style.display = 'none';
    previewBody.innerHTML = '';
    currentPreviewUrl = '';
    currentPreviewFilename = '';
    previewOpenLink.removeAttribute('href');
  }

  function openPreview(url, filename, kind) {
    previewTitle.textContent = filename;
    previewBody.innerHTML = '';
    currentPreviewUrl = url;
    currentPreviewFilename = filename;

    if (kind === 'png') {
      var img = document.createElement('img');
      img.src = url;
      previewBody.appendChild(img);
    } else {
      var iframe = document.createElement('iframe');
      iframe.src = url;
      iframe.style.width = '100%';
      iframe.style.height = '70vh';
      previewBody.appendChild(iframe);
    }

    previewOpenLink.href = url;
    previewModal.style.display = 'flex';
  }

  function triggerDownload(url, filename) {
    var link = document.createElement('a');
    link.href = url;
    link.download = filename;
    link.setAttribute('download', filename);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }

  function triggerBlobDownloadFromUrl(url, filename) {
    fetch(url)
      .then(function (response) {
        return response.blob();
      })
      .then(function (blob) {
        var blobUrl = URL.createObjectURL(blob);
        triggerDownload(blobUrl, filename);
        setTimeout(function () { URL.revokeObjectURL(blobUrl); }, 1000);
        setStatus('Download started');
      })
      .catch(function (error) {
        console.error(error);
        setStatus('Download failed. Use Open and save manually.');
      });
  }

  function getExportPaths() {
    var items = [];
    if (!selectedLayer || !selectedLayer._path) return items;

    items.push({
      d: selectedLayer._path.getAttribute('d'),
      bbox: selectedLayer._path.getBBox()
    });

    if (selectedFeature && getIso2(selectedFeature) === 'in' && indiaClaimOverlay && indiaClaimOverlay._path) {
      items.push({
        d: indiaClaimOverlay._path.getAttribute('d'),
        bbox: indiaClaimOverlay._path.getBBox()
      });
    }

    return items.filter(function (item) {
      return item && item.d && item.bbox && isFinite(item.bbox.width) && isFinite(item.bbox.height);
    });
  }

  function buildExportSvgString(exportMode) {
    if (!selectedLayer || !selectedFeature || !selectedLayer._path) return null;

    var exportItems = getExportPaths();
    if (!exportItems.length) return null;

    var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    exportItems.forEach(function (item) {
      minX = Math.min(minX, item.bbox.x);
      minY = Math.min(minY, item.bbox.y);
      maxX = Math.max(maxX, item.bbox.x + item.bbox.width);
      maxY = Math.max(maxY, item.bbox.y + item.bbox.height);
    });

    if (!isFinite(minX) || !isFinite(minY) || !isFinite(maxX) || !isFinite(maxY)) return null;

    var padding = 24;
    var exportSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    exportSvg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    exportSvg.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');
    exportSvg.setAttribute('width', '2048');
    exportSvg.setAttribute('height', '2048');
    exportSvg.setAttribute('viewBox', [
      minX - padding,
      minY - padding,
      (maxX - minX) + padding * 2,
      (maxY - minY) + padding * 2
    ].join(' '));

    var iso2 = getIso2(selectedFeature) || 'generic';
    var patternId = 'flag-fill-' + iso2;

    if (exportMode === 'flag') {
      createFlagPattern(patternId, iso2);
      var patternNode = document.getElementById(patternId);
      if (patternNode) {
        var defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
        defs.appendChild(patternNode.cloneNode(true));
        exportSvg.appendChild(defs);
      }
    }

    var fillValue = borderColorInput.value;
    if (exportMode === 'land') fillValue = '#bfa46f';
    if (exportMode === 'flag') fillValue = 'url(#' + patternId + ')';

    exportItems.forEach(function (item) {
      var exportPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      exportPath.setAttribute('d', item.d);
      exportPath.setAttribute('stroke', borderColorInput.value);
      exportPath.setAttribute('stroke-width', String(Number(borderSizeInput.value)));
      exportPath.setAttribute('stroke-linejoin', 'round');
      exportPath.setAttribute('stroke-linecap', 'round');
      exportPath.setAttribute('fill', fillValue);
      exportPath.setAttribute('fill-opacity', '1');
      exportSvg.appendChild(exportPath);
    });

    return new XMLSerializer().serializeToString(exportSvg);
  }

  function exportSelectedPng(exportMode) {
    var svgString = buildExportSvgString(exportMode);
    if (!svgString) {
      setStatus('Select a country first');
      return;
    }

    var img = new Image();
    img.decoding = 'sync';

    img.onload = function () {
      var canvas = document.createElement('canvas');
      canvas.width = 2048;
      canvas.height = 2048;

      var ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, 2048, 2048);
      ctx.drawImage(img, 0, 0, 2048, 2048);

      var pngUrl;
      try {
        pngUrl = canvas.toDataURL('image/png');
      } catch (e) {
        console.error(e);
        setStatus('PNG export failed');
        return;
      }

      var modeSuffix = exportMode === 'flag'
        ? '_flag_transparent.png'
        : exportMode === 'land'
        ? '_land_transparent.png'
        : '_solid_transparent.png';

      var filename = getFeatureName(selectedFeature)
        .replace(/[^a-z0-9]+/gi, '_')
        .toLowerCase() + modeSuffix;

      openPreview(pngUrl, filename, 'png');
      setTimeout(function () { triggerDownload(pngUrl, filename); }, 50);

      if (exportMode === 'flag') setStatus('Transparent PNG with flag ready');
      else if (exportMode === 'land') setStatus('Transparent land PNG ready');
      else setStatus('Transparent solid PNG ready');
    };

    img.onerror = function (err) {
      console.error(err);
      setStatus('PNG export failed');
    };

    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgString);
  }

  function recordMode() {
    app.classList.add('recording');
  }

  function makeHandle(latlng, className) {
    return L.marker(latlng, { draggable: true, icon: L.divIcon({ className: className, html: '', iconSize: [14, 14], iconAnchor: [7, 7] }) }).addTo(map);
  }

  function createArrowDecorator(start, end) {
    var p1 = map.latLngToContainerPoint(start);
    var p2 = map.latLngToContainerPoint(end);
    var dx = p2.x - p1.x;
    var dy = p2.y - p1.y;
    var len = Math.sqrt(dx * dx + dy * dy) || 1;
    var ux = dx / len;
    var uy = dy / len;
    var base = L.point(p2.x - ux * 20, p2.y - uy * 20);
    var left = L.point(base.x - uy * 10, base.y + ux * 10);
    var right = L.point(base.x + uy * 10, base.y - ux * 10);
    return [map.containerPointToLatLng(left), end, map.containerPointToLatLng(right)];
  }

  function arcPoints(start, end, lift) {
    var p1 = map.latLngToContainerPoint(start);
    var p2 = map.latLngToContainerPoint(end);
    var mid = L.point((p1.x + p2.x) / 2, (p1.y + p2.y) / 2 - lift);
    var pts = [];
    for (var t = 0; t <= 1.001; t += 0.04) {
      var x = (1 - t) * (1 - t) * p1.x + 2 * (1 - t) * t * mid.x + t * t * p2.x;
      var y = (1 - t) * (1 - t) * p1.y + 2 * (1 - t) * t * mid.y + t * t * p2.y;
      pts.push(map.containerPointToLatLng(L.point(x, y)));
    }
    return pts;
  }

  function addPathLabel(latlng, text, className) {
    var marker = L.marker(latlng, {
      interactive: false,
      icon: L.divIcon({ className: className || 'path-label', html: text, iconSize: [0, 0], iconAnchor: [0, 0] })
    }).addTo(map);
    pathLabels.push(marker);
    return marker;
  }

  function serializeLatLng(latlng) {
    return { lat: Number(latlng.lat), lng: Number(latlng.lng) };
  }

  function deserializeLatLng(obj) {
    return L.latLng(obj.lat, obj.lng);
  }

  function getLatestArrowData(type) {
    for (var i = pathLayers.length - 1; i >= 0; i -= 1) {
      var layer = pathLayers[i];
      if (layer && layer.__kind === type && layer.__startHandle && layer.__endHandle) {
        return {
          start: serializeLatLng(layer.__startHandle.getLatLng()),
          end: serializeLatLng(layer.__endHandle.getLatLng())
        };
      }
    }
    return null;
  }

  function rebuildWarArrow(data) {
    var start = deserializeLatLng(data.start);
    var end = deserializeLatLng(data.end);
    var mainLine = L.polyline([start, end], { color: '#ef4444', weight: 5, opacity: 0.95 }).addTo(map);
    var arrowHead = L.polygon(createArrowDecorator(start, end), { color: '#ef4444', fillColor: '#ef4444', fillOpacity: 0.95, weight: 1 }).addTo(map);
    pathLayers.push(mainLine, arrowHead);
  }

  function rebuildMissilePath(data) {
    var start = deserializeLatLng(data.start);
    var end = deserializeLatLng(data.end);
    var pts = arcPoints(start, end, 90);
    var trail = L.polyline(pts, { color: '#f59e0b', weight: 4, opacity: 0.95, dashArray: '10 8' }).addTo(map);
    var arrowHead = L.polygon(createArrowDecorator(pts[pts.length - 2], end), { color: '#f59e0b', fillColor: '#f59e0b', fillOpacity: 0.95, weight: 1 }).addTo(map);
    pathLayers.push(trail, arrowHead);
  }

  function addWarArrow() {
    if (!selectedLayer) { setStatus('Select a country first, then add war arrow'); return; }
    var start = getVisualCenter(selectedLayer);
    var end = L.latLng(start.lat + 6, start.lng + 10);
    var mainLine = L.polyline([start, end], { color: '#ef4444', weight: 5, opacity: 0.95 }).addTo(map);
    var arrowHead = L.polygon(createArrowDecorator(start, end), { color: '#ef4444', fillColor: '#ef4444', fillOpacity: 0.95, weight: 1 }).addTo(map);
    var startHandle = makeHandle(start, 'arrow-handle');
    var endHandle = makeHandle(end, 'arrow-handle');
    var label = addPathLabel(L.latLng((start.lat + end.lat) / 2, (start.lng + end.lng) / 2), 'WAR ARROW');
    function redraw() {
      var s = startHandle.getLatLng();
      var e = endHandle.getLatLng();
      mainLine.setLatLngs([s, e]);
      arrowHead.setLatLngs(createArrowDecorator(s, e));
      label.setLatLng(L.latLng((s.lat + e.lat) / 2, (s.lng + e.lng) / 2));
    }
    startHandle.on('drag', redraw);
    endHandle.on('drag', redraw);
    mainLine.__kind = 'war';
    mainLine.__startHandle = startHandle;
    mainLine.__endHandle = endHandle;
    pathLayers.push(mainLine, arrowHead);
    pathHandles.push(startHandle, endHandle);
    setStatus('War arrow added. Drag endpoints to adjust');
  }

  function addMissilePath() {
    if (!selectedLayer) { setStatus('Select a country first, then add missile path'); return; }
    var start = getVisualCenter(selectedLayer);
    var end = L.latLng(start.lat + 8, start.lng + 14);
    var trail = L.polyline(arcPoints(start, end, 90), { color: '#f59e0b', weight: 4, opacity: 0.95, dashArray: '10 8' }).addTo(map);
    var arc = arcPoints(start, end, 90);
    var arrowHead = L.polygon(createArrowDecorator(arc[arc.length - 2], end), { color: '#f59e0b', fillColor: '#f59e0b', fillOpacity: 0.95, weight: 1 }).addTo(map);
    var startHandle = makeHandle(start, 'missile-handle');
    var endHandle = makeHandle(end, 'missile-handle');
    var label = addPathLabel(L.latLng((start.lat + end.lat) / 2 + 1, (start.lng + end.lng) / 2), 'MISSILE');
    function redraw() {
      var s = startHandle.getLatLng();
      var e = endHandle.getLatLng();
      var pts = arcPoints(s, e, 90);
      trail.setLatLngs(pts);
      arrowHead.setLatLngs(createArrowDecorator(pts[pts.length - 2], e));
      label.setLatLng(L.latLng((s.lat + e.lat) / 2 + 1, (s.lng + e.lng) / 2));
    }
    startHandle.on('drag', redraw);
    endHandle.on('drag', redraw);
    trail.__kind = 'missile';
    trail.__startHandle = startHandle;
    trail.__endHandle = endHandle;
    pathLayers.push(trail, arrowHead);
    pathHandles.push(startHandle, endHandle);
    setStatus('Missile path added. Drag endpoints to adjust');
  }

  function findCountryLayer(query) {
    if (!geoLayer || !query) return null;
    var normalized = String(query).trim().toLowerCase();
    if (!normalized) return null;
    var found = null;
    geoLayer.eachLayer(function (layer) {
      if (found) return;
      var name = getFeatureName(layer.feature).toLowerCase();
      if (name.includes(normalized)) found = layer;
    });
    return found;
  }

  function startFillDrag(e) {
    if (!dragFillToggle.checked) return;
    if (!selectedLayer || !selectedFeature || fillModeSelect.value === 'solid') return;
    isDraggingFill = true;
    dragStartPoint = e.containerPoint;
    dragStartOffset = getStoredFillOffset(selectedFeature);
    map.dragging.disable();
    setStatus('Dragging full flag fill...');
  }

  function moveFillDrag(e) {
    if (!isDraggingFill || !selectedFeature || !selectedLayer) return;
    var dx = (e.containerPoint.x - dragStartPoint.x) / Math.max(1, map.getSize().x);
    var dy = (e.containerPoint.y - dragStartPoint.y) / Math.max(1, map.getSize().y);
    saveFillOffset(selectedFeature, { x: dragStartOffset.x + dx, y: dragStartOffset.y + dy });
    applyHighlight(selectedLayer, selectedFeature);
  }

  function endFillDrag() {
    if (!isDraggingFill) return;
    isDraggingFill = false;
    map.dragging.enable();
    setStatus('Flag fill position saved for ' + getFeatureName(selectedFeature));
  }

  satelliteLayer.on('tileerror', function () {
    if (basemapSelect.value === 'satellite') {
      basemapSelect.value = 'dark';
      useBasemap('dark');
      setStatus('Satellite failed. Switched to dark fallback map');
    }
  });

  previewCloseBtn.addEventListener('click', closePreviewModal);
  previewDownloadBtn.addEventListener('click', function () {
    if (!currentPreviewUrl || !currentPreviewFilename) {
      setStatus('Nothing to download');
      return;
    }
    triggerBlobDownloadFromUrl(currentPreviewUrl, currentPreviewFilename);
  });
  previewModal.addEventListener('click', function (e) {
    if (e.target === previewModal) closePreviewModal();
  });
  fab.addEventListener('click', toggleTools);
  basemapSelect.addEventListener('change', function () { useBasemap(this.value); });
  recordBtn.addEventListener('click', recordMode);
  showUiBtn.addEventListener('click', showUI);
  warArrowBtn.addEventListener('click', addWarArrow);
  missileBtn.addEventListener('click', addMissilePath);
  clearPathsBtn.addEventListener('click', clearPaths);
  exportNoFlagBtn.addEventListener('click', function () { exportSelectedPng('solid'); });
  exportWithFlagBtn.addEventListener('click', function () { exportSelectedPng('flag'); });
  exportLandBtn.addEventListener('click', function () { exportSelectedPng('land'); });
  clearSelectionBtn.addEventListener('click', clearSelection);
  resetBtn.addEventListener('click', resetMap);

  function runCountrySearch(query) {
    var normalized = String(query || '').trim().toLowerCase();
    if (!normalized) return;

    if (basemapSelect.value === 'indiaOutline' && (normalized === 'india' || normalized === 'bharat')) {
      map.setView([22.8, 81.2], 4.6, { animate: true });
      setStatus('India outline focused');
      return;
    }

    var layer = findCountryLayer(query);
    if (layer) {
      selectCountry(layer.feature, layer);
    } else {
      setStatus('Country not found');
    }
  }

  if (searchInput) {
    searchInput.addEventListener('keydown', function (e) {
      if (e.key !== 'Enter') return;
      runCountrySearch(this.value);
      if (quickSearchInput) quickSearchInput.value = this.value;
    });
  }

  quickSearchInput.addEventListener('keydown', function (e) {
    if (e.key !== 'Enter') return;
    runCountrySearch(this.value);
  });

  quickSearchBtn.addEventListener('click', function () {
    runCountrySearch(quickSearchInput.value);
  });

  ['fillModeSelect', 'borderColor', 'borderSize', 'fadeSlider', 'labelToggle', 'flagToggle', 'dragFillToggle'].forEach(function (id) {
    var eventName = (id === 'borderColor' || id === 'borderSize' || id === 'fadeSlider') ? 'input' : 'change';
    document.getElementById(id).addEventListener(eventName, function () {
      if (selectedLayer && selectedFeature) applyHighlight(selectedLayer, selectedFeature);
    });
  });

  map.on('mousedown', startFillDrag);
  map.on('mousemove', moveFillDrag);
  map.on('mouseup', endFillDrag);

  function loadCountryBoundaries() {
    var sources = [
      'https://cdn.jsdelivr.net/gh/datasets/geo-countries@master/data/countries.geojson',
      'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson'
    ];

    function renderGeo(data) {
      if (geoLayer) {
        map.removeLayer(geoLayer);
      }
      geoLayer = L.geoJSON(data, {
        renderer: L.svg(),
        style: { color: '#ffffff', weight: 0.7, fillOpacity: 0, fillColor: '#ffffff', opacity: 1 },
        onEachFeature: function (feature, layer) {
          layer.on('click', function () { selectCountry(feature, layer); });
        }
      }).addTo(map);
      setStatus('All countries loaded');
    }

    function tryLoad(index) {
      if (index >= sources.length) {
        console.error('All boundary sources failed');
        setStatus('Country boundaries failed to load');
        return;
      }

      fetch(sources[index])
        .then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(function (data) {
          renderGeo(data);
        })
        .catch(function (e) {
          console.warn('Boundary source failed:', sources[index], e);
          tryLoad(index + 1);
        });
    }

    tryLoad(0);
  }

  loadCountryBoundaries();
  useBasemap('satellite');

  function runTests() {
    console.assert(getIso2({ properties: { ISO_A2: 'IN' } }) === 'in', 'ISO_A2 should normalize to lowercase');
    console.assert(getIso2({ properties: { ISO_A2: '-99', ISO_A3: 'IND' } }) === 'in', 'ISO_A3 fallback should work');
    console.assert(getIso2({ properties: { ISO_A2: '-99' } }) === null, 'Invalid ISO_A2 should return null');
    console.assert(getFeatureName({ properties: { ADMIN: 'India' } }) === 'India', 'Should prefer ADMIN for name');
    console.assert(getFeatureName({ properties: {} }) === 'Unknown', 'Missing name should return Unknown');
    console.assert(getFlagUrl({ properties: { ISO_A2: 'US' } }).indexOf('/us.png') !== -1, 'Flag URL should use lowercase code');
    console.assert(findCountryLayer('') === null, 'Empty search should return null');
    console.assert(getIso2({ properties: { ISO2: 'JP' } }) === 'jp', 'ISO2 fallback should work');

    var indiaPattern = createFlagPattern('test-pattern-india-detail', 'in');
    console.assert(Boolean(indiaPattern), 'India flag pattern should be created');
    console.assert(indiaPattern.querySelectorAll('line').length === 24, 'Ashok Chakra should have 24 spokes');
    console.assert(indiaPattern.querySelectorAll('circle').length >= 2, 'Ashok Chakra should include outer ring and center');

    var genericPattern = createFlagPattern('test-pattern-generic', 'zz');
    console.assert(Boolean(genericPattern), 'Generic fallback pattern should be created');

    var testPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    var testLayer = { _path: testPath };
    console.assert(applyProceduralFlagFill(testLayer, { properties: { ISO_A2: 'IN' } }) === true, 'Flag fill should apply on SVG path');
    console.assert(testPath.getAttribute('fill') === 'url(#flag-fill-in)', 'Flag fill should target the India pattern');

    console.assert(getOrCreateDefsRoot() !== null, 'Defs root should always exist');
    console.assert(getStoredFillOffset({ properties: { ISO_A2: 'IN' } }).x === 0, 'Default fill offset x should be zero');
    saveFillOffset({ properties: { ISO_A2: 'IN' } }, { x: 0.12, y: -0.08 });
    var savedOffset = getStoredFillOffset({ properties: { ISO_A2: 'IN' } });
    console.assert(Math.abs(savedOffset.x - 0.12) < 0.0001, 'Saved fill offset x should persist');

    var fakeLayer = {
      getLatLngs: function () { return [[{ lat: 10, lng: 20 }, { lat: 20, lng: 20 }, { lat: 20, lng: 30 }]]; },
      getBounds: function () { return { getCenter: function () { return L.latLng(15, 25); } }; }
    };
    var visualCenter = getVisualCenter(fakeLayer);
    console.assert(Math.abs(visualCenter.lat - 16.6666667) < 0.01, 'Visual center should use polygon average latitude');
    console.assert(Math.abs(visualCenter.lng - 23.3333333) < 0.01, 'Visual center should use polygon average longitude');

    var arrowTest = createArrowDecorator(L.latLng(0, 0), L.latLng(1, 1));
    console.assert(Array.isArray(arrowTest) && arrowTest.length === 3, 'Arrow decorator should return 3 points');
    var missileTest = arcPoints(L.latLng(0, 0), L.latLng(2, 2), 40);
    console.assert(Array.isArray(missileTest) && missileTest.length > 10, 'Missile arc should generate multiple points');

    console.assert(typeof closePreviewModal === 'function', 'Preview modal close function should exist');
    console.assert(typeof openPreview === 'function', 'Preview helper should exist');
    console.assert(typeof triggerBlobDownloadFromUrl === 'function', 'Blob download helper should exist');
    console.assert(typeof clearSelection === 'function', 'Clear selection helper should exist');
    console.assert(typeof applyIndiaClaimOverlay === 'function', 'India claim overlay helper should exist');
    console.assert(typeof showIndiaSchoolOutline === 'function', 'India school outline helper should exist');

    var noFlagSvg = buildExportSvgString('solid');
    console.assert(typeof noFlagSvg === 'string' || noFlagSvg === null, 'Solid export SVG should be string or null');
    var withFlagSvg = buildExportSvgString('flag');
    console.assert(typeof withFlagSvg === 'string' || withFlagSvg === null, 'Flag export SVG should be string or null');
    var landSvg = buildExportSvgString('land');
    console.assert(typeof landSvg === 'string' || landSvg === null, 'Land export SVG should be string or null');
  }

  runTests();
}());
</script>
