<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
margin:0;
background:black;
font-family:Arial;
}

#map{
height:100vh;
}

/* floating button */

.fab{

position:absolute;

top:15px;

right:15px;

width:45px;

height:45px;

border-radius:50%;

background:#2563eb;

display:flex;

align-items:center;

justify-content:center;

color:white;

font-size:22px;

cursor:pointer;

z-index:9999;

}

/* hidden toolbar */

.toolbar{

position:absolute;

top:70px;

right:15px;

background:#020617ee;

backdrop-filter:blur(10px);

padding:10px;

border-radius:10px;

display:none;

flex-direction:column;

gap:6px;

color:white;

font-size:12px;

z-index:9999;

}

.toolbar input{

width:120px;

}

.glow{

filter: drop-shadow(0px 0px 8px gold);

}

/* border animation */

.leaflet-interactive{

stroke-dasharray:1000;

stroke-dashoffset:1000;

animation:draw 1s forwards;

}

@keyframes draw{

to{

stroke-dashoffset:0;

}

}

.label{

color:white;

font-size:11px;

text-shadow:0 0 5px black;

}

</style>

</head>

<body>

<div
class="fab"
onclick="toggleTools()"
>
⚙
</div>

<div class="toolbar" id="tools">

Upload

<input type="file" id="fileInput">

Opacity

<input
type="range"
min="0.1"
max="1"
step="0.1"
value="0.8"
id="fadeSlider"
>

Border

<input
type="range"
min="1"
max="5"
value="2"
id="borderSize"
>

Color

<input
type="color"
value="#ffd60a"
id="borderColor"
>

Glow

<input type="checkbox" id="glowToggle">

<button onclick="cinematicMode()">
Cinematic
</button>

<button onclick="takeShot()">
Export
</button>

</div>

<div id="map"></div>

<script>

var map=L.map(
'map',
{

zoomControl:false,

attributionControl:false,

preferCanvas:true,

zoomAnimation:false,

fadeAnimation:false,

markerZoomAnimation:false

}

).setView([20,0],3);

L.tileLayer(

'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',

{

maxZoom:18,

updateWhenZooming:false,

updateWhenIdle:true

}

).addTo(map);

var uploadedImage="";

var selected=[];

var patterns={};

function toggleTools(){

var t=
document.getElementById("tools");

if(t.style.display=="flex")
t.style.display="none";

else
t.style.display="flex";

}

fileInput.onchange=function(e){

var reader=
new FileReader();

reader.onload=function(){

uploadedImage=
reader.result;

};

reader.readAsDataURL(
e.target.files[0]
);

};

fetch(
'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson'
)

.then(r=>r.json())

.then(data=>{

L.geoJson(
data,
{

style:{

color:"#415a77",

weight:0.7,

fillOpacity:0

},

onEachFeature:
function(feature,layer){

layer.on(
'click',
function(){

selected.push(layer);

highlight(layer);

cameraFocus(layer);

addLabel(feature,layer);

addFlag(feature,layer);

});

}

}

).addTo(map);

});

function highlight(layer){

var zoom=
map.getZoom();

var w=
borderSize.value*
(zoom/3);

layer.setStyle({

color:
borderColor.value,

weight:w,

fillOpacity:
fadeSlider.value

});

if(glowToggle.checked)

layer._path.classList.add("glow");

}

function cameraFocus(layer){

map.fitBounds(

layer.getBounds(),

{

padding:[50,50]

}

);

}

function addLabel(feature,layer){

var center=
layer.getBounds().getCenter();

L.marker(
center,
{

icon:L.divIcon({

className:"label",

html:
feature.properties.ADMIN

})

}

).addTo(map);

}

function addFlag(feature,layer){

if(uploadedImage=="")
return;

var id=
feature.properties.ISO_A3;

var svg=
map.getPanes()
.overlayPane
.querySelector("svg");

if(!patterns[id]){

var defs=
document.createElementNS(
"http://www.w3.org/2000/svg",
"defs"
);

var pattern=
document.createElementNS(
"http://www.w3.org/2000/svg",
"pattern"
);

pattern.setAttribute(
"id",
"id"+id
);

pattern.setAttribute(
"width","1"
);

pattern.setAttribute(
"height","1"
);

var img=
document.createElementNS(
"http://www.w3.org/2000/svg",
"image"
);

img.setAttribute(
"href",
uploadedImage
);

img.setAttribute(
"width","100%"
);

img.setAttribute(
"height","100%"
);

pattern.appendChild(img);

defs.appendChild(pattern);

svg.appendChild(defs);

patterns[id]=true;

}

layer._path.setAttribute(

"fill",

"url(#id"+id+")"

);

}

function cinematicMode(){

document
.getElementById("tools")
.style.display="none";

}

function takeShot(){

document
.getElementById("tools")
.style.display="none";

html2canvas(

document.querySelector("#map"),

{

scale:2

}

)

.then(canvas=>{

var link=
document.createElement('a');

link.download="map.png";

link.href=
canvas.toDataURL();

link.click();

});

}

</script>

</body>

</html>
