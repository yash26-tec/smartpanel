<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
margin:0;
background:black;
font-family:Arial;
}

#map{
height:100vh;
}

/* floating settings button */

.fab{

position:absolute;

top:15px;

right:15px;

width:46px;

height:46px;

border-radius:50%;

background:#2563eb;

display:flex;

align-items:center;

justify-content:center;

color:white;

font-size:22px;

cursor:pointer;

z-index:9999;

box-shadow:0 0 15px rgba(37,99,235,0.6);

}

/* hidden toolbar */

.toolbar{

position:absolute;

top:70px;

right:15px;

background:#020617ee;

backdrop-filter:blur(10px);

padding:12px;

border-radius:12px;

display:none;

flex-direction:column;

gap:7px;

color:white;

font-size:12px;

z-index:9999;

border:1px solid rgba(255,255,255,0.15);

}

.toolbar input{

width:140px;

}

/* cinematic glow */

.glow{

filter: drop-shadow(0px 0px 12px gold)
drop-shadow(0px 0px 25px orange);

}

/* border draw animation */

.leaflet-interactive{

stroke-dasharray:1200;

stroke-dashoffset:1200;

animation:draw 1.2s forwards;

}

@keyframes draw{

to{

stroke-dashoffset:0;

}

}

/* labels */

.label{

color:white;

font-size:12px;

font-weight:bold;

text-shadow:
0 0 6px black,
0 0 10px black;

}

</style>

</head>

<body>

<div
class="fab"
onclick="toggleTools()"
>
⚙
</div>

<div
class="toolbar"
id="tools"
>

Upload Flag

<input type="file" id="fileInput">

Fill Opacity

<input
type="range"
min="0"
max="1"
step="0.1"
value="0.6"
id="fadeSlider"
>

Border Size

<input
type="range"
min="1"
max="6"
value="2"
id="borderSize"
>

Border Color

<input
type="color"
value="#ffd60a"
id="borderColor"
>

Glow

<input
type="checkbox"
id="glowToggle"
checked
>

<button onclick="cinematicMode()">
Recording Mode
</button>

<button onclick="resetMap()">
Reset
</button>

<button onclick="takeShot()">
Export PNG
</button>

</div>

<div id="map"></div>

<script>

var map=L.map(
'map',
{

zoomControl:false,

attributionControl:false,

preferCanvas:true,

zoomAnimation:true,

fadeAnimation:false,

markerZoomAnimation:false

}

).setView([20,0],3);

L.tileLayer(

'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',

{

maxZoom:18,

updateWhenZooming:false,

updateWhenIdle:true,

keepBuffer:10

}

).addTo(map);

var uploadedImage="";

var selected=[];

var patterns={};

var labels=[];

function toggleTools(){

var t=
document.getElementById("tools");

t.style.display=
t.style.display=="flex"
?"none"
:"flex";

}

fileInput.onchange=function(e){

var reader=
new FileReader();

reader.onload=function(){

uploadedImage=
reader.result;

};

reader.readAsDataURL(
e.target.files[0]
);

};

fetch(
'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson'
)

.then(r=>r.json())

.then(data=>{

L.geoJson(
data,
{

style:{

color:"#415a77",

weight:0.7,

fillOpacity:0

},

onEachFeature:
function(feature,layer){

layer.on(
'click',
function(){

if(!selected.includes(layer))
selected.push(layer);

highlight(layer);

camera(layer);

label(feature,layer);

flag(feature,layer);

});

}

}

).addTo(map);

});

function highlight(layer){

var zoom=
map.getZoom();

var w=
borderSize.value*
(zoom/3);

layer.setStyle({

color:
borderColor.value,

weight:w,

fillOpacity:
fadeSlider.value

});

if(glowToggle.checked)

layer._path.classList.add("glow");

}

function camera(layer){

map.flyToBounds(

layer.getBounds(),

{

padding:[100,100],

duration:2,

easeLinearity:0.2

}

);

}

function label(feature,layer){

var c=
layer.getBounds()
.getCenter();

var m=
L.marker(
c,
{

icon:
L.divIcon({

className:"label",

html:
feature.properties.ADMIN

})

}

).addTo(map);

labels.push(m);

}

function flag(feature,layer){

if(uploadedImage=="")
return;

var id=
feature.properties.ISO_A3;

var svg=
map.getPanes()
.overlayPane
.querySelector("svg");

if(!patterns[id]){

var defs=
document.createElementNS(
"http://www.w3.org/2000/svg",
"defs"
);

var pattern=
document.createElementNS(
"http://www.w3.org/2000/svg",
"pattern"
);

pattern.setAttribute(
"id",
"id"+id
);

pattern.setAttribute(
"width","1"
);

pattern.setAttribute(
"height","1"
);

var img=
document.createElementNS(
"http://www.w3.org/2000/svg",
"image"
);

img.setAttribute(
"href",
uploadedImage
);

img.setAttribute(
"width","100%"
);

img.setAttribute(
"height","100%"
);

pattern.appendChild(img);

defs.appendChild(pattern);

svg.appendChild(defs);

patterns[id]=true;

}

layer._path.setAttribute(

"fill",

"url(#id"+id+")"

);

}

function cinematicMode(){

document
.getElementById("tools")
.style.display="none";

document
.querySelector(".fab")
.style.display="none";

}

function resetMap(){

selected=[];

labels.forEach(l=>map.removeLayer(l));

labels=[];

map.eachLayer(function(layer){

if(layer.setStyle)

layer.setStyle({

color:"#415a77",

weight:0.7,

fillOpacity:0

});

});

}

function takeShot(){

document
.getElementById("tools")
.style.display="none";

document
.querySelector(".fab")
.style.display="none";

html2canvas(

document.querySelector("#map"),

{

scale:2

}

)

.then(canvas=>{

var link=
document.createElement('a');

link.download="map.png";

link.href=
canvas.toDataURL();

link.click();

});

}

borderColor.oninput=
()=>selected.forEach(highlight);

borderSize.oninput=
()=>selected.forEach(highlight);

glowToggle.onchange=
()=>selected.forEach(highlight);

fadeSlider.oninput=
()=>selected.forEach(highlight);

</script>

</body>

</html>
